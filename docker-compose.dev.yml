# ==========================================
# Docker Compose - Development Environment
# ==========================================
version: '3.8'

services:
  # MongoDB Database (Development)
  mongodb:
    image: mongo:7.0
    container_name: carbon-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: carbon_accounting_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - carbon-dev-network

  # MongoDB Express (Database GUI)
  mongo-express:
    image: mongo-express:latest
    container_name: carbon-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: devpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:devpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - carbon-dev-network

  # Redis (Development)
  redis:
    image: redis:7-alpine
    container_name: carbon-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - carbon-dev-network

networks:
  carbon-dev-network:
    driver: bridge

volumes:
  mongodb_dev_data:
    driver: local
